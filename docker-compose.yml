# ============================================================
# Sanando desde el Corazón — Docker Compose
# 14 servicios: 5 PostgreSQL, Redis, MinIO, 3 APIs, Frontend,
#               Nginx, Migration (one-off), Certbot (one-off)
# ============================================================

networks:
  backend:
    driver: bridge
  proxy:
    driver: bridge

volumes:
  clinical_pgdata:
  portal_pgdata:
  podcast_pgdata:
  auth_pgdata:
  audit_pgdata:
  redis_data:
  minio_data:
  certbot_conf:
  certbot_www:

# ----------------------------------------------------------
# Bloque de configuración reutilizable para PostgreSQL
# ----------------------------------------------------------
x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

x-api-common: &api-common
  restart: unless-stopped
  env_file: .env
  networks:
    - backend
    - proxy

services:
  # ──────────────────────────────────────────────────────────
  # 1. clinical-postgres  (expedientes clínicos — pgcrypto)
  # ──────────────────────────────────────────────────────────
  clinical-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CLINICAL_DB_USER}
      POSTGRES_PASSWORD: ${CLINICAL_DB_PASSWORD}
      POSTGRES_DB: ${CLINICAL_DB_NAME}
    volumes:
      - clinical_pgdata:/var/lib/postgresql/data
      - ./shared/db/init-clinical.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck: *postgres-healthcheck
    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 2. portal-postgres
  # ──────────────────────────────────────────────────────────
  portal-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PORTAL_DB_USER}
      POSTGRES_PASSWORD: ${PORTAL_DB_PASSWORD}
      POSTGRES_DB: ${PORTAL_DB_NAME}
    volumes:
      - portal_pgdata:/var/lib/postgresql/data
      - ./shared/db/init-base.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck: *postgres-healthcheck
    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 3. podcast-postgres
  # ──────────────────────────────────────────────────────────
  podcast-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PODCAST_DB_USER}
      POSTGRES_PASSWORD: ${PODCAST_DB_PASSWORD}
      POSTGRES_DB: ${PODCAST_DB_NAME}
    volumes:
      - podcast_pgdata:/var/lib/postgresql/data
      - ./shared/db/init-base.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck: *postgres-healthcheck
    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 4. auth-postgres  (refresh tokens, sesiones)
  # ──────────────────────────────────────────────────────────
  auth-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
      - ./shared/db/init-base.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck: *postgres-healthcheck
    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 5. audit-postgres  (INSERT-only, nunca UPDATE/DELETE)
  # ──────────────────────────────────────────────────────────
  audit-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUDIT_DB_USER}
      POSTGRES_PASSWORD: ${AUDIT_DB_PASSWORD}
      POSTGRES_DB: ${AUDIT_DB_NAME}
    volumes:
      - audit_pgdata:/var/lib/postgresql/data
      - ./shared/db/init-audit.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "127.0.0.1:5436:5432"
    healthcheck: *postgres-healthcheck
    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 6. Redis
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 7. MinIO  (almacenamiento de archivos S3-compatible)
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 8. clinical-api  (puerto 8001)
  # ──────────────────────────────────────────────────────────
  clinical-api:
    <<: *api-common
    build:
      context: .
      dockerfile: clinical-api/Dockerfile
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      clinical-postgres:
        condition: service_healthy
      auth-postgres:
        condition: service_healthy
      audit-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./secrets/jwt_private.pem:/run/secrets/jwt_private.pem:ro
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro
      - ./migration:/app/migration:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────────────────────
  # 9. portal-api  (puerto 8002)
  # ──────────────────────────────────────────────────────────
  portal-api:
    <<: *api-common
    build:
      context: .
      dockerfile: portal-api/Dockerfile
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      portal-postgres:
        condition: service_healthy
      auth-postgres:
        condition: service_healthy
      audit-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./secrets/jwt_private.pem:/run/secrets/jwt_private.pem:ro
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────────────────────
  # 10. podcast-api  (puerto 8003)
  # ──────────────────────────────────────────────────────────
  podcast-api:
    <<: *api-common
    build:
      context: .
      dockerfile: podcast-api/Dockerfile
    ports:
      - "127.0.0.1:8003:8003"
    depends_on:
      podcast-postgres:
        condition: service_healthy
      audit-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./secrets/jwt_private.pem:/run/secrets/jwt_private.pem:ro
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────────────────────
  # 11. frontend  Next.js (puerto 3002)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - clinical-api
      - portal-api
      - podcast-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - proxy

  # ──────────────────────────────────────────────────────────
  # 12. Nginx  (reverse proxy + TLS)
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - clinical-api
      - portal-api
      - podcast-api
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - proxy

  # ──────────────────────────────────────────────────────────
  # 13. migration  (one-off: Notion → PostgreSQL)
  # Ejecutar con: docker compose run --rm migration
  # ──────────────────────────────────────────────────────────
  migration:
    build:
      context: .
      dockerfile: migration/Dockerfile
    env_file: .env
    depends_on:
      clinical-postgres:
        condition: service_healthy
    profiles:
      - migration
    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 14. certbot  (renovación TLS — one-off)
  # Ejecutar con: docker compose run --rm certbot
  # Renovación automática: docker compose run --rm certbot renew
  # ──────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL}
      --agree-tos
      --no-eff-email
      -d ${NGINX_HOST}
      -d www.${NGINX_HOST}
    profiles:
      - certbot
