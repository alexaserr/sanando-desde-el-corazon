# ============================================================
# Sanando desde el Corazón — nginx.conf
# Reverse proxy con TLS, rate limiting y cabeceras de seguridad
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;

    # --- Optimizaciones de red ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Rate limiting ---
    # Límite general para APIs
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # Límite estricto para endpoints de autenticación
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # Límite para uploads de podcast (más permisivo en tiempo, menos en concurrencia)
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # --- Upstreams ---
    upstream clinical_api {
        server clinical-api:8001;
        keepalive 32;
    }

    upstream portal_api {
        server portal-api:8002;
        keepalive 32;
    }

    upstream podcast_api {
        server podcast-api:8003;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:3002;
        keepalive 32;
    }

    # --- Proxy headers comunes ---
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    proxy_read_timeout  60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout  60s;

    # ──────────────────────────────────────────────────────────
    # HTTP → HTTPS redirect + ACME challenge (certbot)
    # ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name sanandodesdeelcorazon.com www.sanandodesdeelcorazon.com;

        # Permite que certbot valide el dominio sin HTTPS
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check interno de Docker
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ──────────────────────────────────────────────────────────
    # HTTPS principal
    # ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name sanandodesdeelcorazon.com www.sanandodesdeelcorazon.com;

        # --- TLS ---
        ssl_certificate     /etc/letsencrypt/live/sanandodesdeelcorazon.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sanandodesdeelcorazon.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/sanandodesdeelcorazon.com/chain.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout    5s;

        # --- Cabeceras de seguridad ---
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

        limit_conn conn_per_ip 20;

        # ── Clinical API ── /api/clinical/* → clinical-api:8001/*
        location /api/clinical/ {
            limit_req zone=api burst=30 nodelay;

            # Auth endpoints con límite más estricto
            location ~ ^/api/clinical/(auth|login|token) {
                limit_req zone=auth burst=5 nodelay;
                proxy_pass http://clinical_api/;
            }

            rewrite ^/api/clinical/(.*) /$1 break;
            proxy_pass http://clinical_api;
        }

        # ── Portal API ── /api/portal/* → portal-api:8002/*
        location /api/portal/ {
            limit_req zone=api burst=30 nodelay;

            location ~ ^/api/portal/(auth|login|token|webhook) {
                limit_req zone=auth burst=5 nodelay;
                proxy_pass http://portal_api/;
            }

            rewrite ^/api/portal/(.*) /$1 break;
            proxy_pass http://portal_api;
        }

        # ── Podcast API ── /api/podcast/* → podcast-api:8003/*
        location /api/podcast/ {
            limit_req zone=api burst=20 nodelay;

            # Uploads de episodios (archivos grandes)
            location /api/podcast/episodes/upload {
                limit_req zone=upload burst=2 nodelay;
                client_max_body_size 500M;
                proxy_read_timeout 300s;
                proxy_send_timeout 300s;
                rewrite ^/api/podcast/(.*) /$1 break;
                proxy_pass http://podcast_api;
            }

            rewrite ^/api/podcast/(.*) /$1 break;
            proxy_pass http://podcast_api;
        }

        # ── Assets estáticos Next.js (caché agresiva) ──
        location /_next/static/ {
            proxy_pass http://frontend_app;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── Frontend Next.js ── todo lo demás
        location / {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://frontend_app;

            # WebSocket para Next.js HMR (dev) y Server-Sent Events
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 300s;
        }
    }

    # --- Mapa para upgrade de WebSocket ---
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }
}
